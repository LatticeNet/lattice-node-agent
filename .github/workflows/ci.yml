name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: checkout lattice-node-agent
        uses: actions/checkout@v6
        with:
          path: lattice-node-agent
      - name: checkout lattice-sdk
        uses: actions/checkout@v6
        with:
          repository: LatticeNet/lattice-sdk
          path: lattice-sdk
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: false
      - name: create workspace
        run: |
          go work init ./lattice-sdk ./lattice-node-agent
          go work edit -replace=github.com/LatticeNet/lattice-sdk@v0.2.0=./lattice-sdk
      - name: gofmt
        working-directory: lattice-node-agent
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: release workflow contract
        working-directory: lattice-node-agent
        run: sh scripts/check-release-workflow.sh
      - name: install integrity contract
        working-directory: lattice-node-agent
        run: sh scripts/test-install-integrity.sh
      - name: vet
        working-directory: lattice-node-agent
        run: go vet ./...
      - name: test
        working-directory: lattice-node-agent
        run: go test -race -cover ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./lattice-node-agent/...
      - name: govulncheck
        working-directory: lattice-node-agent
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
