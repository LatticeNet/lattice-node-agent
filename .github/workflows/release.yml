name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: lattice-agent-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: lattice-agent-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: lattice-agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: lattice-agent-darwin-arm64
    steps:
      - name: validate release ref
        run: |
          case "$GITHUB_REF_NAME" in
            v[0-9]*.[0-9]*.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-alpha.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-beta.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-rc.[0-9]*) ;;
            *)
              echo "::error::release workflow tags must be stable vX.Y.Z or prerelease vX.Y.Z-alpha.N / beta.N / rc.N"
              exit 1
              ;;
          esac
      - name: checkout lattice-node-agent
        uses: actions/checkout@v6
        with:
          path: lattice-node-agent
      - name: checkout lattice-sdk
        uses: actions/checkout@v6
        with:
          repository: LatticeNet/lattice-sdk
          path: lattice-sdk
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: false
      - name: create workspace
        run: go work init ./lattice-sdk ./lattice-node-agent
      - name: build binary
        id: build
        working-directory: lattice-node-agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARTIFACT: ${{ matrix.artifact }}
          LATTICE_COMPAT_SERVER_MIN: alpha-0.2.1a11
          LATTICE_COMPAT_DASHBOARD_MIN: alpha-0.2.1a11
          LATTICE_COMPAT_CHANNEL: alpha
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X main.version=$VERSION -X main.compatServerMin=$LATTICE_COMPAT_SERVER_MIN -X main.compatDashboardMin=$LATTICE_COMPAT_DASHBOARD_MIN -X main.compatChannel=$LATTICE_COMPAT_CHANNEL" -o "dist/$ARTIFACT" ./cmd/lattice-agent
          if [ "$GOOS/$GOARCH" = "linux/amd64" ]; then
            test "$(dist/$ARTIFACT -version)" = "$VERSION"
            dist/$ARTIFACT -compat-json | grep -F "\"server_min\":\"$LATTICE_COMPAT_SERVER_MIN\""
          fi
          (cd dist && sha256sum "$ARTIFACT" > "$ARTIFACT.sha256")
          echo "binary_path=lattice-node-agent/dist/$ARTIFACT" >> "$GITHUB_OUTPUT"
      - name: attest binary
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.build.outputs.binary_path }}
      - name: upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            lattice-node-agent/dist/${{ matrix.artifact }}
            lattice-node-agent/dist/${{ matrix.artifact }}.sha256

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: validate release ref
        run: |
          case "$GITHUB_REF_NAME" in
            v[0-9]*.[0-9]*.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-alpha.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-beta.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-rc.[0-9]*) ;;
            *)
              echo "::error::release workflow tags must be stable vX.Y.Z or prerelease vX.Y.Z-alpha.N / beta.N / rc.N"
              exit 1
              ;;
          esac
      - name: checkout lattice-node-agent
        uses: actions/checkout@v6
      - name: download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: create checksum manifest
        run: |
          cd dist
          cat ./*.sha256 | sort -k2 > SHA256SUMS
          sha256sum -c SHA256SUMS
      - name: publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PRERELEASE=false
          MAKE_LATEST=true
          RELEASE_CREATE_FLAGS="--latest"
          CHANNEL_NOTE="Stable release."
          case "$GITHUB_REF_NAME" in
            *-alpha.* | *-beta.* | *-rc.*)
              PRERELEASE=true
              MAKE_LATEST=false
              RELEASE_CREATE_FLAGS="--prerelease --latest=false"
              CHANNEL_NOTE="Prerelease channel. It must not become GitHub Latest and server latest will not auto-select it."
              ;;
          esac
          NOTES="lattice-node-agent $GITHUB_REF_NAME

          $CHANNEL_NOTE

          Artifacts:
          - lattice-agent-linux-amd64
          - lattice-agent-linux-arm64
          - lattice-agent-darwin-amd64
          - lattice-agent-darwin-arm64
          - SHA256SUMS

          Use the matching binary URL and SHA-256 digest in Lattice agent update policies. The binary reports version $VERSION through -version and compatibility metadata through -compat-json."
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber --repo "$GITHUB_REPOSITORY"
            RELEASE_ID="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" --jq '.id')"
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F "prerelease=$PRERELEASE" -f "make_latest=$MAKE_LATEST" >/dev/null
          else
            gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --verify-tag --title "lattice-node-agent $GITHUB_REF_NAME" --notes "$NOTES" $RELEASE_CREATE_FLAGS
          fi
